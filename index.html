<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCCE Learning Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Sarabun', 'sans-serif'], serif: ['Sarabun', 'serif'] }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.min.js"></script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
        
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); opacity: 0.5; }
            50% { transform: translateY(-20px) scale(1.05); opacity: 0.8; }
            100% { transform: translateY(0px) scale(1); opacity: 0.5; }
        }
        .animate-float-slow { animation: float 12s ease-in-out infinite; }
        .animate-float-medium { animation: float 8s ease-in-out infinite reverse; }
        .animate-float-fast { animation: float 6s ease-in-out infinite; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.3); border-radius: 20px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(75, 85, 99, 0.4); }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(107, 114, 128, 0.5); }
    </style>

    <script>
        window.addEventListener('error', function(e) {
            const root = document.getElementById('root');
            if(root) {
                root.innerHTML = '<div style="padding:2rem; max-w:600px; margin:2rem auto; background:#fef2f2; border:1px solid #f87171; border-radius:1rem; color:#991b1b; font-family:sans-serif;">' + 
                                 '<h2 style="font-size:1.25rem; font-weight:bold; margin-bottom:1rem;">⚠️ เกิดข้อผิดพลาดในการโหลดระบบ (System Error)</h2>' +
                                 '<p style="background:#fff; padding:1rem; border-radius:0.5rem; font-family:monospace; font-size:0.875rem;">' + e.message + '</p>' +
                                 '<p style="margin-top:1rem; font-size:0.875rem;">กรุณาก๊อปปี้ข้อความในกรอบสีขาวด้านบน ส่งกลับมาให้ผมแก้ไขได้เลยครับ</p>' +
                                 '</div>';
            }
        });
    </script>
</head>
<body>
    <div id="root">
        <div class="flex h-screen w-full items-center justify-center bg-gray-50 text-emerald-600 font-bold text-lg flex-col gap-4">
            <svg class="animate-spin h-8 w-8 text-emerald-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            กำลังโหลดระบบ... (Loading System)
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // ดึงไอคอนอย่างปลอดภัย ป้องกัน Error ถ้าโหลดไม่ทัน
        const lucideIcons = window.lucideReact || window.LucideReact || {};
        const { 
          User, BookOpen, Target, TrendingUp, Award,

          ExternalLink, X, MonitorPlay, FileText, FileImage, Globe, 
          Moon, Sun, Sparkles, PlayCircle, Filter, Zap 
        } = lucideIcons;

        // Custom Link Icon
        const LinkIcon = ({ size = 24, className = "" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
          </svg>
        );

        const App = () => {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [certData, setCertData] = useState(null);
          const [lang, setLang] = useState('th');
          const [darkMode, setDarkMode] = useState(false);

          const [categoryFilter, setCategoryFilter] = useState('all');
          const [learningType, setLearningType] = useState('all');
          const [formatFilter, setFormatFilter] = useState('all');

            if (categoryName === tx("นโยบายและแผน", "Policy & Planning")) return "bg-blue-100/80 text-blue-700 dark:bg-blue-500/20 dark:text-blue-300 border border-blue-200/50 dark:border-blue-500/30";
            if (categoryName === tx("ทักษะดิจิทัล", "Digital Skills")) return "bg-purple-100/80 text-purple-700 dark:bg-purple-500/20 dark:text-purple-300 border border-purple-200/50 dark:border-purple-500/30";
            if (categoryName === tx("ทักษะการทำงาน", "Soft Skills")) return "bg-amber-100/80 text-amber-700 dark:bg-amber-500/20 dark:text-amber-300 border border-amber-200/50 dark:border-amber-500/30";
            return "bg-gray-100 text-gray-700 dark:bg-gray-800 dark:text-gray-300 border border-gray-200 dark:border-gray-700";
          };

          const userData = {
            name: tx("นายสมชาย รักษ์โลก", "Mr. Somchai Raklok"),
            position: tx("นักวิชาการสิ่งแวดล้อมชำนาญการ", "Environmentalist, Professional Level"),
            department: tx("กองขับเคลื่อนการลดก๊าซเรือนกระจก\nกลุ่มบัญชีก๊าซเรือนกระจก (กบจ.)", "GHG Reduction Driving Division\n(GHG Inventory Group)"),
            workYears: tx("7 ปี 4 เดือน", "7 Years 4 Months"),
            careerTrack: tx("สายงานวิชาการ", "Knowledge Worker"),
            status: tx("ผู้มีศักยภาพสูง", "High Potential"),

            readinessCriteria: tx(
              [
                "อายุงานและการดำรงตำแหน่งระดับชำนาญการตามเกณฑ์",
                "ผลการประเมินปฏิบัติงานย้อนหลังอยู่ในระดับ 'ดีเด่น'",
                "ผลประเมินสมรรถนะผ่านเกณฑ์เป้าหมาย 80%",
                "ความคืบหน้าการจัดทำผลงานวิชาการ (อยู่ระหว่างดำเนินการ)"
              ],
              [
                "Tenure and holding professional level according to criteria",
                "Past Performance Appraisal (KPI) is at 'Outstanding' level",
                "Competency assessment passed the 80% target",

              ]

          const dashboardStats = [
            {

              value: tx("48 ชม.", "48 Hrs"), 
              icon: Clock, 
              color: "text-blue-600 dark:text-blue-400", 
              bg: "bg-blue-100 dark:bg-blue-900/50",
              trend: tx("+12 ชม. จากเดือนที่แล้ว", "+12 Hrs from last month"),
              trendIcon: TrendingUp,

            {

              bg: "bg-emerald-100 dark:bg-emerald-900/50",

              trendColor: "text-emerald-500"

            {

              { name: tx("การจัดการก๊าซเรือนกระจก", "GHG Management"), count: 0, color: "bg-emerald-500" },
              { name: tx("นโยบายและแผน", "Policy & Planning"), count: 0, color: "bg-blue-500" },
              { name: tx("ทักษะดิจิทัล", "Digital Skills"), count: 0, color: "bg-purple-500" },
              { name: tx("ทักษะการทำงาน", "Soft Skills"), count: 0, color: "bg-amber-500" }
            ],
            recentCourses: [
              { title: tx("หลักการประเมินคาร์บอนฟุตพริ้นท์องค์กร", "Corporate Carbon Footprint Assessment Principles"), category: tx("การจัดการก๊าซเรือนกระจก", "GHG Management"), type: "e-Learning", status: "completed", progress: 100, date: tx("22 เมษายน พ.ศ. 2567", "April 22, 2024") },
              { title: tx("การจัดทำบัญชีก๊าซเรือนกระจกระดับประเทศ", "National GHG Inventory Preparation"), category: tx("การจัดการก๊าซเรือนกระจก", "GHG Management"), type: "Training", status: "completed", progress: 100, date: tx("15 มีนาคม พ.ศ. 2567", "March 15, 2024") },
              { title: tx("การประเมินวัฏจักรชีวิตของผลิตภัณฑ์ (Life Cycle Assessment: LCA)", "Product Life Cycle Assessment (LCA)"), category: tx("การจัดการก๊าซเรือนกระจก", "GHG Management"), type: "e-Learning", status: "completed", progress: 100, date: tx("10 กุมภาพันธ์ พ.ศ. 2567", "February 10, 2024") },
              { title: tx("มาตรฐาน ISO 14064-1 ระดับองค์กร", "ISO 14064-1 Corporate Standard"), category: tx("การจัดการก๊าซเรือนกระจก", "GHG Management"), type: "e-Learning", status: "completed", progress: 100, date: tx("28 มกราคม พ.ศ. 2567", "January 28, 2024") },
              { title: tx("กลไกการลดก๊าซเรือนกระจก (T-VER)", "GHG Reduction Mechanisms (T-VER)"), category: tx("การจัดการก๊าซเรือนกระจก", "GHG Management"), type: "e-Learning", status: "completed", progress: 100, date: tx("15 ธันวาคม พ.ศ. 2566", "December 15, 2023") },
              { title: tx("แนวทางการทวนสอบก๊าซเรือนกระจก", "GHG Verification Guidelines"), category: tx("การจัดการก๊าซเรือนกระจก", "GHG Management"), type: "e-Learning", status: "in_progress", progress: 10, date: "-" },
              { title: tx("การเจรจาต่อรองระหว่างประเทศด้านสภาพภูมิอากาศ", "International Climate Negotiation"), category: tx("นโยบายและแผน", "Policy & Planning"), type: "Training", status: "completed", progress: 100, date: tx("5 พฤษภาคม พ.ศ. 2567", "May 5, 2024") },
              { title: tx("นโยบายการเปลี่ยนแปลงสภาพภูมิอากาศของไทย", "Thailand's Climate Change Policy"), category: tx("นโยบายและแผน", "Policy & Planning"), type: "e-Learning", status: "completed", progress: 100, date: tx("12 พฤศจิกายน พ.ศ. 2566", "November 12, 2023") },
              { title: tx("การบูรณาการเป้าหมาย NDC สู่แผนปฏิบัติการ", "Integrating NDC Targets into Action Plans"), category: tx("นโยบายและแผน", "Policy & Planning"), type: "e-Learning", status: "completed", progress: 100, date: tx("30 ตุลาคม พ.ศ. 2566", "October 30, 2023") },
              { title: tx("กฎหมายและระเบียบที่เกี่ยวข้องกับสิ่งแวดล้อม", "Environmental Laws and Regulations"), category: tx("นโยบายและแผน", "Policy & Planning"), type: "e-Learning", status: "in_progress", progress: 45, date: "-" },
              { title: tx("การจัดการฐานข้อมูลขนาดใหญ่ (Big Data)", "Big Data Management"), category: tx("ทักษะดิจิทัล", "Digital Skills"), type: "e-Learning", status: "completed", progress: 100, date: tx("20 มกราคม พ.ศ. 2567", "January 20, 2024") },
              { title: tx("การสร้างภาพข้อมูลด้วย Power BI", "Data Visualization with Power BI"), category: tx("ทักษะดิจิทัล", "Digital Skills"), type: "Training", status: "completed", progress: 100, date: tx("5 ธันวาคม พ.ศ. 2566", "December 5, 2023") },
              { title: tx("การประยุกต์ใช้ AI ในการวิเคราะห์ข้อมูล", "AI Application in Data Analysis"), category: tx("ทักษะดิจิทัล", "Digital Skills"), type: "e-Learning", status: "in_progress", progress: 60, date: "-" },
              { title: tx("ทักษะการนำเสนอสำหรับนักวิชาการ", "Presentation Skills for Academics"), category: tx("ทักษะการทำงาน", "Soft Skills"), type: "Training", status: "completed", progress: 100, date: tx("18 กันยายน พ.ศ. 2566", "September 18, 2023") },
              { title: tx("การทำงานร่วมกันอย่างมีประสิทธิภาพ", "Effective Team Collaboration"), category: tx("ทักษะการทำงาน", "Soft Skills"), type: "e-Learning", status: "completed", progress: 100, date: tx("2 สิงหาคม พ.ศ. 2566", "August 2, 2023") },
            ],
            recommendedCourses: [
              {

                match: 95
              },
              {
                title: tx("การประเมินวัฏจักรชีวิตของผลิตภัณฑ์ (Life Cycle Assessment: LCA) ขั้นพื้นฐาน", "Basic Life Cycle Assessment (LCA)"),
                category: tx("การจัดการก๊าซเรือนกระจก", "GHG Management"),
                reason: tx("ทักษะที่ควรพัฒนาเพิ่มเติมจากการประเมิน", "Skills to develop (Gap Analysis)"),
                duration: tx("4 ชม.", "4 Hrs"),
                match: 88
              },
              {
                title: tx("เทคนิคการนำเสนอและสร้างภาพข้อมูล", "Data Visualization Techniques"),

                reason: tx("ข้อเสนอแนะจากหัวหน้างาน", "Recommended by Supervisor (Feedback)"),
                duration: tx("3 ชม.", "3 Hrs"),
                match: 82
              }
            ]
          };

          const SidebarItem = ({ icon: Icon, label, id }) => (
            <button
              onClick={() => setActiveTab(id)}
              className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all duration-300 group text-left relative overflow-hidden ${
                activeTab === id 
                  ? 'text-emerald-700 dark:text-emerald-300 shadow-sm' 
                  : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100/80 dark:hover:bg-gray-800/80 hover:text-emerald-600 dark:hover:text-emerald-400'
              }`}
            >
              {activeTab === id && (
                <div className="absolute inset-0 bg-gradient-to-r from-emerald-100 to-emerald-50/50 dark:from-emerald-500/20 dark:to-emerald-500/5 -z-10 border-l-4 border-emerald-500 rounded-xl"></div>
              )}
              {Icon && <Icon size={20} className={`shrink-0 transition-transform duration-300 ${activeTab === id ? 'text-emerald-600 dark:text-emerald-400 scale-110' : 'text-gray-400 group-hover:text-emerald-500 group-hover:scale-110'}`} />}
              <span className="whitespace-nowrap truncate flex-1">{label}</span>
            </button>
          );

          const ProgressBar = ({ label, current, target, percentage }) => (
            <div className="mb-5 group">
              <div className="flex justify-between text-sm mb-2">
                <span className="font-bold text-gray-700 dark:text-gray-200 group-hover:text-emerald-600 dark:group-hover:text-emerald-400 transition-colors">{label}</span>
                <span className="text-gray-500 dark:text-gray-400 font-medium bg-gray-100 dark:bg-gray-800 px-2 py-0.5 rounded-md">{tx("ระดับ", "Level")} {current} / {target}</span>

              <div className="w-full bg-gray-100 dark:bg-gray-800/80 rounded-full h-3 overflow-hidden shadow-inner border border-gray-200/50 dark:border-gray-700/50">

                  style={{ width: `${Math.min(percentage, 100)}%` }}
                >
                  <div className="absolute inset-0 bg-white/20 w-1/2 -skew-x-12 translate-x-[-100%] group-hover:animate-[shimmer_1.5s_infinite]"></div>

            </div>
          );

          const renderCertModal = () => {
            if (!certData) return null;
            return (

                                  {BookOpen && <BookOpen size={36} className="opacity-50" />}
                                </div>
                                <p className="text-lg font-black text-gray-600 dark:text-gray-300">{tx("ไม่พบข้อมูลคอร์สเรียน", "No courses found")}</p>
                                <p className="text-sm mt-2 font-medium">{tx("ลองปรับเปลี่ยนตัวกรองเพื่อค้นหาอีกครั้ง", "Try adjusting the filters to search again")}</p>
                              </div>
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </Card>
              </div>
            </div>
          );

          const renderCareerPath = () => (
            <div className="space-y-6 animate-fadeIn">
              <Card accent="bg-gradient-to-r from-emerald-500 to-teal-500">
                <h3 className="text-xl font-black text-gray-800 dark:text-gray-100 mb-2 flex items-center gap-3">
                  <span className="inline-flex p-2 bg-emerald-100 dark:bg-emerald-900/40 rounded-xl text-emerald-600 dark:text-emerald-400">
                      {TrendingUp && <TrendingUp size={22} />}
                  </span>
                  {tx("เส้นทางความก้าวหน้า", "Career Path Planning")}
                </h3>
                <p className="text-sm font-medium text-gray-500 dark:text-gray-400 mb-12 ml-12">{tx("ออกแบบเส้นทางการเรียนรู้ที่สอดคล้องกับสถานะปัจจุบัน เพื่อเตรียมความพร้อม", "Design learning paths aligned with current status for succession planning.")}</p>

                <div className="relative py-4 px-4 md:px-12 mb-16">
                  <div className="absolute inset-0 flex items-center justify-center px-8 md:px-16" aria-hidden="true">
                    <div className="w-full border-t-4 border-gray-100 dark:border-gray-700"></div>
                  </div>
                  <div className="relative flex justify-between">
                    <div className="flex flex-col items-center group">
                      <div className="w-14 h-14 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center border-4 border-white dark:border-gray-800 z-10 text-gray-400 dark:text-gray-500 shadow-sm group-hover:scale-110 transition-transform">
                        {CheckCircle && <CheckCircle size={24} strokeWidth={3} />}
                      </div>
                      <p className="mt-4 text-sm font-bold text-gray-500 dark:text-gray-400">{tx("ปฏิบัติการ", "Practitioner")}</p>
                    </div>
                    
                    <div className="flex flex-col items-center">
                      <div className="w-16 h-16 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-full flex items-center justify-center border-4 border-white dark:border-gray-800 z-10 text-white shadow-lg shadow-emerald-500/40 transform scale-110 relative">
                        <div className="absolute -inset-2 bg-emerald-500/20 rounded-full animate-ping"></div>
                        {User && <User size={28} strokeWidth={2.5} />}
                      </div>
                      <p className="mt-5 text-sm font-black text-emerald-700 dark:text-emerald-300 bg-emerald-50 dark:bg-emerald-900/40 px-4 py-1.5 rounded-full shadow-sm">{tx("ชำนาญการ (ปัจจุบัน)", "Professional (Current)")}</p>
                    </div>

                    <div className="flex flex-col items-center group">
                      <div className="w-14 h-14 bg-white dark:bg-gray-800 border-4 border-blue-500 rounded-full flex items-center justify-center z-10 text-blue-500 shadow-md group-hover:scale-110 transition-transform">
                        {Target && <Target size={24} strokeWidth={2.5} />}
                      </div>
                      <p className="mt-4 text-sm font-bold text-blue-600 dark:text-blue-400">{tx("ชำนาญการพิเศษ (เป้าหมาย)", "Senior Professional (Target)")}</p>
                    </div>

                    <div className="flex flex-col items-center group">
                      <div className="w-14 h-14 bg-gray-50 dark:bg-gray-800 border-4 border-white dark:border-gray-700 rounded-full flex items-center justify-center z-10 text-gray-300 dark:text-gray-600 group-hover:scale-110 transition-transform">
                        {Award && <Award size={24} strokeWidth={2.5} />}
                      </div>
                      <p className="mt-4 text-sm font-bold text-gray-400 dark:text-gray-500">{tx("เชี่ยวชาญ", "Expert")}</p>
                    </div>
                  </div>
                </div>

                <div className="bg-gradient-to-br from-blue-50/80 to-indigo-50/30 dark:from-blue-900/20 dark:to-indigo-900/10 rounded-3xl p-6 md:p-10 border border-blue-100/50 dark:border-blue-800/30 shadow-inner">
                  <h4 className="text-lg font-black text-blue-900 dark:text-blue-200 mb-6 flex items-center gap-3">
                    <span className="inline-flex p-2 bg-blue-100 dark:bg-blue-800/50 rounded-xl text-blue-600">
                        {Target && <Target size={20}/>}
                    </span> 
                    {tx("ทักษะที่ต้องเตรียมพร้อมสำหรับ: นักวิชาการสิ่งแวดล้อมชำนาญการพิเศษ", "Skills required for: Environmentalist, Senior Professional Level")}
                  </h4>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="bg-white/80 dark:bg-gray-800/80 backdrop-blur-sm p-6 rounded-2xl shadow-sm border border-white dark:border-gray-700 hover:shadow-md hover:-translate-y-1 transition-all duration-300">
                      <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start mb-4 gap-3">
                        <span className="text-base font-black text-gray-800 dark:text-gray-100 leading-snug">{tx("การเป็นผู้ทวนสอบก๊าซเรือนกระจก", "GHG Validator/Verifier")}</span>
                        <span className="text-[10px] font-black uppercase tracking-wider bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-400 px-3 py-1.5 rounded-lg whitespace-nowrap">{tx("ส่วนต่าง: ต้องพัฒนา", "Gap: Needs Dev")}</span>
                      </div>
                      <p className="text-sm font-medium text-gray-600 dark:text-gray-300 bg-gray-50 dark:bg-gray-700/50 p-4 rounded-xl border border-gray-100 dark:border-gray-700 flex items-start gap-2">
                        <LinkIcon size={16} className="text-gray-400 shrink-0 mt-0.5"/>
                        {tx("เชื่อมโยงกับแผนพัฒนา: เตรียมเข้ารับการอบรม ISO 14064-3 ในไตรมาส 3", "Linked to IDP: Prepare for ISO 14064-3 training in Q3")}
                      </p>
                    </div>
                    <div className="bg-white/80 dark:bg-gray-800/80 backdrop-blur-sm p-6 rounded-2xl shadow-sm border border-white dark:border-gray-700 hover:shadow-md hover:-translate-y-1 transition-all duration-300">
                      <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start mb-4 gap-3">
                        <span className="text-base font-black text-gray-800 dark:text-gray-100 leading-snug">{tx("การพัฒนาระบบ MRV สำหรับลดก๊าซเรือนกระจก", "MRV System Development for GHG Reduction")}</span>
                        <span className="text-[10px] font-black uppercase tracking-wider bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-400 px-3 py-1.5 rounded-lg whitespace-nowrap">{tx("ส่วนต่าง: กำลังดำเนินการ", "Gap: In Progress")}</span>
                      </div>
                      <p className="text-sm font-medium text-gray-600 dark:text-gray-300 bg-gray-50 dark:bg-gray-700/50 p-4 rounded-xl border border-gray-100 dark:border-gray-700 flex items-start gap-2">
                        <LinkIcon size={16} className="text-gray-400 shrink-0 mt-0.5"/>
                        {tx("เชื่อมโยงกับระบบพี่เลี้ยง: ปรึกษาแนวทางการทำระบบ MRV กับพี่เลี้ยง", "Linked to Mentoring: Consult MRV system guidelines with Mentor")}
                      </p>
                    </div>
                  </div>
                </div>

                <div className="mt-10 border-t border-gray-100 dark:border-gray-700/50 pt-10">
                  <h4 className="text-xl font-black text-gray-800 dark:text-gray-100 mb-8 flex items-center gap-3">
                    <span className="inline-flex p-2 bg-emerald-100 dark:bg-emerald-900/40 rounded-xl text-emerald-600 dark:text-emerald-400">
                        {TrendingUp && <TrendingUp size={20}/>}
                    </span>
                    {tx("พัฒนาการเปรียบเทียบปี 2566 - 2567", "Progress Tracking (Comparison 2023 - 2024)")}
                  </h4>
                  <div className="flex flex-col md:flex-row items-center gap-6 bg-white dark:bg-gray-800 p-6 md:p-8 rounded-3xl border border-gray-100 dark:border-gray-700 shadow-sm">
                    <div className="flex-1 w-full bg-gray-50 dark:bg-gray-700/30 p-6 rounded-2xl border border-gray-100 dark:border-gray-600">
                      <p className="text-sm font-bold text-gray-600 dark:text-gray-300 mb-4">{tx("ปี 2566: ทักษะภาษาอังกฤษ", "2023: English Skills")} <span className="bg-gray-200 dark:bg-gray-600 px-3 py-1 rounded-lg text-[10px] uppercase tracking-wider ml-2">{tx("ระดับเริ่มต้น", "Beginner")}</span></p>
                      <div className="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-3 overflow-hidden shadow-inner"><div className="bg-gray-400 dark:bg-gray-500 h-full rounded-full w-1/3"></div></div>
                    </div>
                    <div className="bg-emerald-50 dark:bg-emerald-900/20 p-4 rounded-full shadow-sm md:rotate-0 rotate-90 flex-shrink-0">
                      {ChevronRight && <ChevronRight className="text-emerald-500" size={28} strokeWidth={3}/>}
                    </div>
                    <div className="flex-1 w-full bg-emerald-50 dark:bg-emerald-900/20 p-6 rounded-2xl border border-emerald-100/50 dark:border-emerald-800/30 shadow-sm relative overflow-hidden">
                      <div className="absolute top-0 right-0 w-16 h-16 bg-emerald-100 dark:bg-emerald-800/40 rounded-bl-full -z-10"></div>
                      <p className="text-sm font-bold text-emerald-800 dark:text-emerald-300 mb-4">{tx("ปี 2567: ทักษะภาษาอังกฤษ", "2024: English Skills")} <span className="bg-emerald-500 text-white px-3 py-1 rounded-lg text-[10px] uppercase tracking-wider ml-2 shadow-sm">{tx("ระดับกลาง", "Intermediate")}</span></p>
                      <div className="w-full bg-white dark:bg-gray-800 rounded-full h-3 overflow-hidden shadow-inner"><div className="bg-gradient-to-r from-emerald-400 to-emerald-500 h-full rounded-full w-2/3 relative"><div className="absolute inset-0 bg-white/20 w-1/2 -skew-x-12 translate-x-[-100%] animate-[shimmer_2s_infinite]"></div></div></div>
                    </div>
                  </div>
                </div>
              </Card>
            </div>
          );

          return (
            <div className={darkMode ? 'dark' : ''}>
              <div className="h-screen w-full bg-gray-50 dark:bg-gray-900 font-sans text-gray-900 dark:text-gray-100 flex overflow-hidden transition-colors duration-500 relative">
                
                <div className="fixed top-0 left-0 w-[500px] h-[500px] bg-emerald-300/20 dark:bg-emerald-900/20 rounded-full mix-blend-multiply filter blur-[100px] opacity-70 animate-float-slow pointer-events-none z-0"></div>
                <div className="fixed top-0 right-0 w-[500px] h-[500px] bg-blue-300/20 dark:bg-blue-900/20 rounded-full mix-blend-multiply filter blur-[100px] opacity-70 animate-float-medium pointer-events-none z-0"></div>
                <div className="fixed -bottom-32 left-1/4 w-[500px] h-[500px] bg-purple-300/20 dark:bg-purple-900/20 rounded-full mix-blend-multiply filter blur-[100px] opacity-70 animate-float-fast pointer-events-none z-0"></div>

                <aside className="w-80 bg-white/90 dark:bg-gray-800/90 backdrop-blur-2xl border-r border-gray-200/50 dark:border-gray-700/50 flex flex-col flex-shrink-0 z-20 shadow-[4px_0_24px_rgba(0,0,0,0.02)] hidden md:flex">
                  <div className="p-8 pb-6 border-b border-gray-100/50 dark:border-gray-700/50">
                    <div className="flex items-center gap-4">
                      <div className="w-12 h-12 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-500/30 transform rotate-3">
                        {BookOpen && <BookOpen className="text-white w-6 h-6 -rotate-3" /> }
                      </div>
                      <div>
                        <h1 className="text-2xl font-black text-gray-800 dark:text-white leading-none tracking-tight">DCCE</h1>
                        <span className="text-[10px] font-bold text-emerald-600 dark:text-emerald-400 uppercase tracking-widest block mt-1 opacity-90">{tx("สมุดพกการเรียนรู้รายบุคคล", "Learning Portfolio")}</span>
                      </div>
                    </div>
                  </div>
                  <div className="p-4 space-y-1.5 flex-1 overflow-y-auto custom-scrollbar">
                    <SidebarItem id="dashboard" icon={LayoutDashboard} label={tx("สรุปภาพรวม", "Dashboard Overview")} />
                    <SidebarItem id="profile" icon={User} label={tx("ข้อมูลพื้นฐานบุคลากร", "Personal Information")} />
                    <SidebarItem id="competency" icon={Target} label={tx("ศักยภาพและแผนพัฒนา", "Assessment & IDP")} />
                    <SidebarItem id="learning" icon={BookOpen} label={tx("ประวัติการพัฒนาและระบบพี่เลี้ยง", "Learning & Mentoring")} />
                    <SidebarItem id="elearning" icon={MonitorPlay} label={tx("e-Learning และการฝึกอบรม", "e-Learning & Training")} />
                    <SidebarItem id="career" icon={TrendingUp} label={tx("เส้นทางความก้าวหน้า", "Career Path")} />
                  </div>
                  <div className="p-5 m-4 bg-gradient-to-r from-gray-50 to-white dark:from-gray-800 dark:to-gray-800/80 border border-gray-100 dark:border-gray-700 rounded-2xl shadow-sm">
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 rounded-full bg-emerald-100 dark:bg-emerald-900/50 flex items-center justify-center text-emerald-700 dark:text-emerald-400 font-black text-sm border-2 border-white dark:border-gray-700 shadow-sm relative">
                        ส.ช.
                        <div className="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 bg-emerald-500 border-2 border-white dark:border-gray-800 rounded-full"></div>
                      </div>
                      <div className="text-xs overflow-hidden">
                        <p className="font-black text-gray-800 dark:text-gray-100 truncate">{tx("สมชาย รักษ์โลก", "Somchai Raklok")}</p>
                        <p className="text-emerald-600 dark:text-emerald-400 font-bold truncate mt-0.5">{tx("ชำนาญการ", "Professional")}</p>
                      </div>
                    </div>
                  </div>
                </aside>

                <main className="flex-1 overflow-y-auto h-full relative scroll-smooth z-10 custom-scrollbar">
                  <div className="max-w-7xl mx-auto p-4 md:p-8 md:pt-6">
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8 bg-white/70 dark:bg-gray-800/70 backdrop-blur-xl p-4 md:px-6 md:py-4 rounded-2xl border border-white/60 dark:border-gray-700/60 shadow-[0_4px_20px_rgba(0,0,0,0.03)] sticky top-4 z-40 transition-all">
                      <h2 className="text-2xl font-black text-gray-800 dark:text-gray-100 flex items-center gap-3 tracking-tight">
                        {activeTab === 'dashboard' && <><span className="inline-flex p-2 bg-emerald-100 dark:bg-emerald-900/40 rounded-xl">{LayoutDashboard && <LayoutDashboard className="text-emerald-600 dark:text-emerald-400" size={20}/>}</span> {tx('สรุปภาพรวมศักยภาพ', 'Dashboard Overview')}</>}
                        {activeTab === 'profile' && <><span className="inline-flex p-2 bg-emerald-100 dark:bg-emerald-900/40 rounded-xl">{User && <User className="text-emerald-600 dark:text-emerald-400" size={20}/>}</span> {tx('ข้อมูลพื้นฐานของฉัน', 'My Profile')}</>}
                        {activeTab === 'competency' && <><span className="inline-flex p-2 bg-emerald-100 dark:bg-emerald-900/40 rounded-xl">{Target && <Target className="text-emerald-600 dark:text-emerald-400" size={20}/>}</span> {tx('ศักยภาพและแผนพัฒนา', 'Competency Assessment & IDP')}</>}
                        {activeTab === 'learning' && <><span className="inline-flex p-2 bg-emerald-100 dark:bg-emerald-900/40 rounded-xl">{BookOpen && <BookOpen className="text-emerald-600 dark:text-emerald-400" size={20}/>}</span> {tx('ประวัติการพัฒนาและระบบพี่เลี้ยง', 'Learning History & Mentoring')}</>}
                        {activeTab === 'elearning' && <><span className="inline-flex p-2 bg-emerald-100 dark:bg-emerald-900/40 rounded-xl">{MonitorPlay && <MonitorPlay className="text-emerald-600 dark:text-emerald-400" size={20}/>}</span> {tx('e-Learning และการฝึกอบรม', 'e-Learning & Training Resources')}</>}
                        {activeTab === 'career' && <><span className="inline-flex p-2 bg-emerald-100 dark:bg-emerald-900/40 rounded-xl">{TrendingUp && <TrendingUp className="text-emerald-600 dark:text-emerald-400" size={20}/>}</span> {tx('ความก้าวหน้าในเส้นทางอาชีพ', 'Career Path Development')}</>}
                      </h2>
                      
                      <div className="flex items-center gap-3 w-full md:w-auto">
                        <button 
                          onClick={() => setDarkMode(!darkMode)}
                          className="flex flex-1 md:flex-none items-center justify-center w-10 h-10 md:w-auto md:px-4 md:py-2.5 gap-2 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-xl text-sm font-bold transition-all shadow-sm border border-gray-100 dark:border-gray-600 hover:shadow-md"
                          title={tx("สลับโหมดมืด/สว่าง", "Toggle Dark/Light Mode")}
                        >
                          {darkMode ? (Sun && <Sun size={18} className="text-amber-500" />) : (Moon && <Moon size={18} className="text-indigo-500" />)}
                          <span className="hidden md:inline">{darkMode ? tx('โหมดสว่าง', 'Light Mode') : tx('โหมดมืด', 'Dark Mode')}</span>
                        </button>

                        <button 
                          onClick={() => setLang(lang === 'th' ? 'en' : 'th')}
                          className="flex flex-1 md:flex-none items-center justify-center w-10 h-10 md:w-auto md:px-4 md:py-2.5 gap-2 bg-emerald-50 dark:bg-emerald-900/40 hover:bg-emerald-100 dark:hover:bg-emerald-800/60 text-emerald-700 dark:text-emerald-300 rounded-xl text-sm font-bold transition-all border border-emerald-100 dark:border-emerald-800/50 shadow-sm hover:shadow-md"
                          title={tx("เปลี่ยนภาษา", "Change Language")}
                        >
                          {Globe && <Globe size={18} />}
                          <span>{lang === 'th' ? 'EN' : 'TH'}</span>
                        </button>

                        <button className="md:hidden bg-gradient-to-br from-emerald-500 to-emerald-600 text-white p-2.5 rounded-xl shadow-md flex-shrink-0">
                          {LayoutDashboard && <LayoutDashboard size={20} />}
                        </button>
                      </div>
                    </header>

                    <div className="pb-20">
                      {activeTab === 'dashboard' && renderDashboard()}
                      {activeTab === 'profile' && renderProfile()}
                      {activeTab === 'competency' && renderCompetency()}
                      {activeTab === 'learning' && renderLearning()}
                      {activeTab === 'elearning' && renderElearning()}
                      {activeTab === 'career' && renderCareerPath()}
                    </div>
                  </div>
                </main>
                
                {renderCertModal()}
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Portfolio Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Prompt', 'sans-serif'],
                        serif: ['Prompt', 'serif'],
                    },
                    // ทำการ Override น้ำหนักฟอนต์ทั้งระบบให้บางลง
                    fontWeight: {
                        normal: '300',     // ปกติใช้ 400 -> ปรับลดเหลือ 300 (Light)
                        medium: '400',     // ปกติใช้ 500 -> ปรับลดเหลือ 400 (Regular)
                        semibold: '500',   // ปกติใช้ 600 -> ปรับลดเหลือ 500 (Medium)
                        bold: '500',       // ปกติใช้ 700 -> ปรับลดเหลือ 500 (Medium)
                        extrabold: '600',  // ปกติใช้ 800 -> ปรับลดเหลือ 600 (SemiBold)
                        black: '700',      // ปกติใช้ 900 -> ปรับลดเหลือ 700 (Bold)
                    }
                }
            }
        }
    </script>
    
    <style>
        /* บังคับให้ฟอนต์พื้นฐานบางลงเป็นระดับ 300 */
        body { font-family: 'Prompt', sans-serif !important; font-weight: 300; }
        
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        @keyframes float {
            0% { transform: translateY(0px) scale(1); opacity: 0.5; }
            50% { transform: translateY(-20px) scale(1.05); opacity: 0.8; }
            100% { transform: translateY(0px) scale(1); opacity: 0.5; }
        }
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0px); }
        }
        @keyframes shimmer {
            100% { transform: translateX(200%) skewX(-12deg); }
        }
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            70% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .animate-float-slow { animation: float 12s ease-in-out infinite; }
        .animate-float-medium { animation: float 8s ease-in-out infinite reverse; }
        .animate-float-fast { animation: float 6s ease-in-out infinite; }
        .animate-slideUpFade { animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-popIn { animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.3); border-radius: 20px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(75, 85, 99, 0.4); }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(107, 114, 128, 0.5); }
    </style>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-500 text-gray-900 dark:text-gray-100 antialiased">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 100% Reliable Native Lucide Icon Wrapper ---
        const IconWrapper = ({ iconName, size = 24, className = "", strokeWidth = 2, color = "currentColor", fill = "none", style, ...props }) => {
            const spanRef = useRef(null);

            useEffect(() => {
                if (spanRef.current && window.lucide) {
                    spanRef.current.innerHTML = `<i data-lucide="${iconName}" class="${className}"></i>`;
                    window.lucide.createIcons({
                        root: spanRef.current,
                        attrs: {
                            width: size,
                            height: size,
                            'stroke-width': strokeWidth,
                            stroke: color,
                            fill: fill
                        }
                    });
                }
            }, [iconName, size, className, strokeWidth, color, fill]);

            return <span ref={spanRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', ...style }} {...props} />;
        };

        // --- Map Icons Exactly using Kebab-case ---
        const User = (p) => <IconWrapper iconName="user" {...p} />;
        const BookOpen = (p) => <IconWrapper iconName="book-open" {...p} />;
        const Target = (p) => <IconWrapper iconName="target" {...p} />;
        const TrendingUp = (p) => <IconWrapper iconName="trending-up" {...p} />;
        const Award = (p) => <IconWrapper iconName="award" {...p} />;
        const MessageSquare = (p) => <IconWrapper iconName="message-square" {...p} />;
        const LayoutDashboard = (p) => <IconWrapper iconName="layout-dashboard" {...p} />;
        const Clock = (p) => <IconWrapper iconName="clock" {...p} />;
        const CheckCircle = (p) => <IconWrapper iconName="check-circle" {...p} />;
        const AlertCircle = (p) => <IconWrapper iconName="alert-circle" {...p} />;
        const Briefcase = (p) => <IconWrapper iconName="briefcase" {...p} />;
        const ChevronRight = (p) => <IconWrapper iconName="chevron-right" {...p} />;
        const BarChart2 = (p) => <IconWrapper iconName="bar-chart-2" {...p} />;
        const Star = (p) => <IconWrapper iconName="star" {...p} />;
        const ExternalLink = (p) => <IconWrapper iconName="external-link" {...p} />;
        const X = (p) => <IconWrapper iconName="x" {...p} />;
        const MonitorPlay = (p) => <IconWrapper iconName="monitor-play" {...p} />;
        const FileText = (p) => <IconWrapper iconName="file-text" {...p} />;
        const FileImage = (p) => <IconWrapper iconName="file-image" {...p} />;
        const Globe = (p) => <IconWrapper iconName="globe" {...p} />;
        const Moon = (p) => <IconWrapper iconName="moon" {...p} />;
        const Sun = (p) => <IconWrapper iconName="sun" {...p} />;
        const Sparkles = (p) => <IconWrapper iconName="sparkles" {...p} />;
        const PlayCircle = (p) => <IconWrapper iconName="play-circle" {...p} />;
        const Filter = (p) => <IconWrapper iconName="filter" {...p} />;
        const Zap = (p) => <IconWrapper iconName="zap" {...p} />;
        const Loader2 = (p) => <IconWrapper iconName="loader-2" {...p} />;
        const Menu = (p) => <IconWrapper iconName="menu" {...p} />;
        const Calendar = (p) => <IconWrapper iconName="calendar" {...p} />;
        const Milestone = (p) => <IconWrapper iconName="milestone" {...p} />;
        const Phone = (p) => <IconWrapper iconName="phone" {...p} />;
        const Mail = (p) => <IconWrapper iconName="mail" {...p} />;
        const Users = (p) => <IconWrapper iconName="users" {...p} />;
        const ZoomIn = (p) => <IconWrapper iconName="zoom-in" {...p} />;
        const ZoomOut = (p) => <IconWrapper iconName="zoom-out" {...p} />;
        const Send = (p) => <IconWrapper iconName="send" {...p} />;
        const ThumbsUp = (p) => <IconWrapper iconName="thumbs-up" {...p} />;

        // --- Components Moved Outside to Prevent Re-mounting/Re-animation ---

        const AnimatedCounter = ({ value, duration = 1500 }) => {
          const [count, setCount] = useState(0);
          useEffect(() => {
            let startTime;
            const animate = (time) => {
              if (!startTime) startTime = time;
              const progress = Math.min((time - startTime) / duration, 1);
              const easeOutQuart = 1 - Math.pow(1 - progress, 4);
              setCount(Math.floor(easeOutQuart * value));
              if (progress < 1) requestAnimationFrame(animate);
            };
            requestAnimationFrame(animate);
          }, [value, duration]);
          return <>{count}</>;
        };

        const SidebarItem = ({ icon: Icon, label, id, activeTab, setActiveTab, setIsMobileMenuOpen }) => (
          <button
            onClick={() => { setActiveTab(id); setIsMobileMenuOpen(false); }}
            className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all duration-300 group text-left relative overflow-hidden focus:outline-none focus:ring-2 focus:ring-emerald-500/50 ${
              activeTab === id 
                ? 'text-emerald-700 dark:text-emerald-300 shadow-md translate-x-1 bg-white dark:bg-gray-800' 
                : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100/80 dark:hover:bg-gray-800/80 hover:text-emerald-600 dark:hover:text-emerald-400 hover:translate-x-1'
            }`}
            aria-label={label}
          >
            <div className={`absolute inset-0 bg-gradient-to-r from-emerald-100 to-emerald-50/50 dark:from-emerald-500/20 dark:to-emerald-500/5 -z-10 border-l-4 border-emerald-500 rounded-xl transition-transform duration-300 origin-left ${activeTab === id ? 'scale-x-100 opacity-100' : 'scale-x-0 opacity-0'}`}></div>
            <Icon size={20} strokeWidth={2} className={`shrink-0 transition-transform duration-300 ${activeTab === id ? 'text-emerald-600 dark:text-emerald-400 scale-110 drop-shadow-sm' : 'text-gray-400 group-hover:text-emerald-500 group-hover:scale-110'}`} />
            <span className="whitespace-nowrap truncate flex-1">{label}</span>
          </button>
        );

        const ProgressBar = ({ label, current, target, max = 5, delay = 0, tx }) => {
          const currentPercentage = Math.min((current / max) * 100, 100);
          const targetPercentage = Math.min((target / max) * 100, 100);
          const isAchieved = current >= target;

          return (
            <div className="mb-6 group animate-slideUpFade opacity-0" style={{ animationDelay: `${delay}ms` }}>
              <div className="flex justify-between items-center mb-2 gap-2">
                <span 
                  className="font-bold text-gray-700 dark:text-gray-200 group-hover:text-emerald-600 dark:group-hover:text-emerald-400 transition-colors truncate cursor-default text-[13px] tracking-tight"
                  title={label}
                >
                  {label}
                </span>
                <span className="shrink-0 text-gray-500 dark:text-gray-400 font-medium bg-gray-100 dark:bg-gray-800 px-2 py-0.5 rounded-md text-[10px] uppercase tracking-wider">
                  {tx(`ระดับ ${current} / ${max}`, `Level ${current} / ${max}`)}
                </span>
              </div>
              
              <div className="w-full h-6 relative mt-1">
                <div className="absolute inset-0 bg-gray-200/60 dark:bg-gray-800/80 rounded-full shadow-inner border border-gray-200/50 dark:border-gray-700/50 overflow-hidden flex z-0">
                   {Array.from({ length: max }).map((_, i) => (
                     <div key={i} className="flex-1 border-r border-white/60 dark:border-gray-700/60 last:border-r-0"></div>
                   ))}
                </div>

                <div 
                  className={`absolute top-0 left-0 bottom-0 rounded-full transition-all duration-1000 ease-out z-10 ${isAchieved ? 'bg-gradient-to-r from-emerald-400 to-emerald-500' : 'bg-gradient-to-r from-amber-400 to-amber-500'}`} 
                  style={{ width: `${currentPercentage}%` }}
                >
                  <div className="absolute inset-0 rounded-full overflow-hidden">
                    <div className="absolute right-0 top-0 bottom-0 w-6 bg-white/30 rounded-full blur-[3px] animate-pulse"></div>
                    <div className="absolute inset-0 bg-white/20 w-1/2 -skew-x-12 translate-x-[-100%] group-hover:animate-[shimmer_1.5s_infinite]"></div>
                  </div>
                </div>

                <div 
                  className="absolute top-0 bottom-0 flex items-center justify-center z-20 group/marker cursor-help transition-all duration-500"
                  style={{ 
                    left: target === max ? 'auto' : `${targetPercentage}%`,
                    right: target === max ? '4px' : 'auto',
                    transform: target === max ? 'none' : 'translateX(-50%)'
                  }}
                >
                  <div className={`flex items-center justify-center rounded-full p-1 shadow-sm transition-transform duration-300 group-hover/marker:scale-110 ${isAchieved ? 'bg-white text-emerald-500 dark:bg-gray-800 dark:text-emerald-400 ring-2 ring-emerald-100 dark:ring-emerald-900' : 'bg-white text-amber-500 dark:bg-gray-800 dark:text-amber-400 ring-2 ring-amber-100 dark:ring-amber-900/50'}`}>
                    {isAchieved ? <CheckCircle size={14} strokeWidth={2.5} /> : <Target size={14} strokeWidth={2.5} />}
                  </div>

                  <div className="absolute bottom-full mb-2 opacity-0 pointer-events-none group-hover/marker:opacity-100 transition-all duration-200 text-[10px] font-bold text-white bg-gray-800 dark:bg-gray-700 px-3 py-1.5 rounded-lg shadow-lg whitespace-nowrap z-30 transform group-hover/marker:-translate-y-1 flex flex-col items-center">
                    <span>{tx(`เป้าหมาย: ระดับ ${target}`, `Target: Level ${target}`)}</span>
                    <span className={`text-[9px] mt-0.5 ${isAchieved ? 'text-emerald-400' : 'text-amber-400'}`}>
                      {isAchieved ? tx('(ผ่านเกณฑ์)', '(Achieved)') : tx('(ต้องพัฒนา)', '(Needs Dev)')}
                    </span>
                    <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-gray-800 dark:border-t-gray-700"></div>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        const Card = ({ children, className = "", accent = "", delay = 0 }) => {
          const divRef = useRef(null);
          const [position, setPosition] = useState({ x: 0, y: 0 });
          const [opacity, setOpacity] = useState(0);

          const handleMouseMove = (e) => {
            if (!divRef.current) return;
            const rect = divRef.current.getBoundingClientRect();
            setPosition({ x: e.clientX - rect.left, y: e.clientY - rect.top });
          };

          return (
            <div
              ref={divRef}
              onMouseMove={handleMouseMove}
              onMouseEnter={() => setOpacity(1)}
              onMouseLeave={() => setOpacity(0)}
              className={`bg-white/80 dark:bg-gray-800/80 backdrop-blur-xl p-6 md:p-8 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white/50 dark:border-gray-700/50 hover:shadow-[0_8px_30px_rgb(16,185,129,0.06)] transition-all duration-500 relative overflow-hidden animate-slideUpFade opacity-0 ${className}`}
              style={{ animationDelay: `${delay}ms` }}
            >
              <div
                className="pointer-events-none absolute -inset-px opacity-0 transition-opacity duration-500 z-0"
                style={{ opacity, background: `radial-gradient(600px circle at ${position.x}px ${position.y}px, rgba(16,185,129,0.06), transparent 40%)` }}
              />
              {accent && <div className={`absolute top-0 left-0 w-full h-1 ${accent} opacity-80 z-10`}></div>}
              <div className="relative z-10 w-full h-full flex flex-col">{children}</div>
            </div>
          );
        };

        const MixedChart = ({ data, color, width = 1000, height = 280, className = "", selectedYear }) => {
          const validLineData = data.filter(d => d.cumulative !== null);
          
          const maxCumulative = Math.max(...validLineData.map(d => d.cumulative)) * 1.2 || 1;
          const maxMonthly = Math.max(...data.map(d => d.monthly)) * 1.8 || 1;
          const padding = 40;
          const chartWidth = width - padding * 2;
          const chartHeight = height - padding * 2;
          const barWidth = Math.max((chartWidth / data.length) * 0.35, 4); 
          const isDense = data.length > 24; 
          const isVeryDense = data.length > 36;
          
          const showLabel = (d, i, total) => {
            if (!isDense) return true;
            if (!isVeryDense) return i % 2 === 0 || i === total - 1; 
            return d.month === "ม.ค." || i === total - 1 || i === 0; 
          };

          return (
            <svg viewBox={`0 0 ${width} ${height}`} className={`w-full overflow-visible ${className}`}>
              <defs>
                <linearGradient id={`grad-${color}`} x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor={color} stopOpacity="0.4" />
                  <stop offset="100%" stopColor={color} stopOpacity="0" />
                </linearGradient>
              </defs>
              
              {/* Grid lines */}
              {[0, 0.5, 1].map((level, i) => (
                 <line key={`grid-${i}`} x1={padding} y1={padding + chartHeight * level} x2={width - padding} y2={padding + chartHeight * level} stroke="currentColor" className="text-gray-200 dark:text-gray-700" strokeWidth="1.5" strokeDasharray="6 6" />
              ))}
              
              {/* Data Rendering (No Connecting Lines) */}
              {data.map((d, i) => {
                const x = padding + (i / (data.length - 1)) * chartWidth;
                const isFuture = d.cumulative === null;
                const barH = (d.monthly / maxMonthly) * chartHeight;
                const barY = padding + chartHeight - barH;
                const cumY = isFuture ? null : padding + chartHeight - (d.cumulative / maxCumulative) * chartHeight;
                const shouldShowLabel = showLabel(d, i, data.length);
                
                return (
                  <g key={`pt-${i}`} className="group cursor-default">
                    {/* X Axis Label */}
                    <text x={x} y={height - 5} textAnchor="middle" className={`text-[12px] font-bold ${isFuture ? 'fill-gray-300 dark:fill-gray-600' : 'fill-gray-500 dark:fill-gray-400'} ${shouldShowLabel ? 'opacity-100' : 'opacity-0'}`}>
                      {isDense ? d.label : d.month}
                    </text>
                    
                    {!isFuture && (
                      <>
                        {/* Vertical Connector Line (Lollipop stem) */}
                        <line x1={x} y1={cumY} x2={x} y2={padding + chartHeight} stroke={color} strokeWidth="1" strokeDasharray="4 4" className="opacity-30 group-hover:opacity-100 transition-opacity" />
                        
                        {/* Monthly Bar */}
                        {d.monthly > 0 && (
                          <rect x={x - barWidth/2} y={barY} width={barWidth} height={barH} fill={color} fillOpacity="0.3" className="transition-all duration-300 group-hover:fill-opacity-70" rx="2" />
                        )}
                        
                        {/* Cumulative Dot */}
                        <circle cx={x} cy={cumY} r={isVeryDense ? "3" : isDense ? "4" : "6"} fill="white" stroke={color} strokeWidth={isDense ? "2" : "3"} className="transition-all duration-300 group-hover:r-[8px] group-hover:stroke-[4px]" />
                        
                        {/* Tooltip on Hover */}
                        <g className="opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50">
                          <rect x={x - 45} y={cumY - 50} width="90" height="40" rx="6" fill="#1f2937" className="dark:fill-gray-700 shadow-lg" />
                          <text x={x} y={cumY - 32} textAnchor="middle" className="text-[10px] font-bold fill-gray-300">{selectedYear === 'all' ? 'สะสมรวม' : 'สะสมปีนี้'}: {d.cumulative}h</text>
                          <text x={x} y={cumY - 18} textAnchor="middle" className="text-[10px] font-bold fill-emerald-400">เดือนนี้: +{d.monthly}h</text>
                        </g>

                        {/* Permanent Text (Hidden if dense) */}
                        {!isDense && (
                          <text x={x} y={cumY - 12} textAnchor="middle" className="text-[12px] font-black fill-gray-400 group-hover:fill-transparent transition-colors">{d.cumulative}</text>
                        )}
                      </>
                    )}
                  </g>
                );
              })}
            </svg>
          );
        };

        const RadarChart = ({ data, size = 300, className="" }) => {
          const center = size / 2;
          const radius = center - 45;
          const max = 5;
          const angleStep = (Math.PI * 2) / data.length;

          const getPoint = (val, index) => {
            const r = (val / max) * radius;
            return `${center + r * Math.cos(index * angleStep - Math.PI / 2)},${center + r * Math.sin(index * angleStep - Math.PI / 2)}`;
          };

          const polygonPoints = data.map((d, i) => getPoint(d.value, i)).join(' ');
          const targetPolygonPoints = data.map((d, i) => getPoint(d.target, i)).join(' ');

          return (
            <svg viewBox={`0 0 ${size} ${size}`} className={`w-full h-full overflow-visible ${className}`}>
              {[1, 2, 3, 4, 5].map((level) => (
                <polygon key={level} points={data.map((_, i) => getPoint(level, i)).join(' ')} fill="none" stroke="currentColor" className="text-gray-200 dark:text-gray-700" strokeWidth="1" />
              ))}
              {data.map((_, i) => (
                <line key={`axis-${i}`} x1={center} y1={center} x2={center + radius * Math.cos(i * angleStep - Math.PI / 2)} y2={center + radius * Math.sin(i * angleStep - Math.PI / 2)} stroke="currentColor" className="text-gray-200 dark:text-gray-700" strokeWidth="1" />
              ))}
              
              <polygon points={targetPolygonPoints} fill="rgba(156, 163, 175, 0.08)" stroke="currentColor" className="text-gray-400 dark:text-gray-500" strokeWidth="1.5" strokeDasharray="4 4" />
              <polygon points={polygonPoints} className="fill-purple-500/30 stroke-purple-500 animate-popIn origin-center" strokeWidth="2" strokeLinejoin="round" />
              
              {data.map((d, i) => {
                const pt = getPoint(d.value, i).split(',');
                const isCore = d.type === 'core';
                const strokeColor = isCore ? "stroke-amber-500" : "stroke-blue-500";
                return <circle key={`pt-${i}`} cx={pt[0]} cy={pt[1]} r="4.5" className={`fill-white ${strokeColor}`} strokeWidth="2.5" />
              })}
              
              {data.map((d, i) => {
                 const labelR = radius + 32; 
                 const x = center + labelR * Math.cos(i * angleStep - Math.PI / 2);
                 const y = center + labelR * Math.sin(i * angleStep - Math.PI / 2);
                 const isCore = d.type === 'core';
                 const textColor = isCore ? "fill-amber-600 dark:fill-amber-500" : "fill-blue-600 dark:fill-blue-500";
                 
                 return (
                   <g key={`lbl-${i}`} className="cursor-help group">
                     <title>{`${d.fullLabel} (ได้ ${d.value} / เป้า ${d.target})`}</title>
                     <text x={x} y={y} textAnchor="middle" dominantBaseline="middle" className={`text-[12px] font-bold transition-opacity group-hover:opacity-80 ${textColor}`}>{d.label}</text>
                   </g>
                 )
              })}
            </svg>
          );
        };

        const InteractiveDonut = ({ segments, total, hoveredDonutSlice, setHoveredDonutSlice }) => {
          const size = 160;
          const center = size / 2;
          const strokeWidth = 24;
          const radius = center - strokeWidth;
          const circumference = 2 * Math.PI * radius;
          let currentOffset = 0;

          if (total === 0) {
            return (
              <svg viewBox={`0 0 ${size} ${size}`} className="w-full h-full transform -rotate-90">
                <circle cx={center} cy={center} r={radius} fill="none" stroke="#e2e8f0" strokeWidth={strokeWidth} />
              </svg>
            );
          }

          return (
            <svg viewBox={`0 0 ${size} ${size}`} className="w-full h-full transform -rotate-90 overflow-visible">
              {segments.map((seg) => {
                const dashArray = (seg.count / total) * circumference;
                const offset = currentOffset;
                currentOffset += dashArray;
                const isHovered = hoveredDonutSlice === seg.id;
                
                return (
                  <circle
                    key={seg.id}
                    cx={center}
                    cy={center}
                    r={radius}
                    fill="none"
                    stroke={seg.color}
                    strokeWidth={isHovered ? strokeWidth + 6 : strokeWidth}

          const downloadCertificate = async (format) => {
            const node = document.getElementById('certificate-node');
            if (!node || !certData) return;

            setDownloadError(null);
            if (format === 'jpg') setIsDownloadingJpg(true);
            if (format === 'pdf') setIsDownloadingPdf(true);

            try {
              if (!window.html2canvas) {
                await new Promise((resolve) => {
                  const script = document.createElement('script');
                  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                  script.onload = resolve;
                  document.head.appendChild(script);
                });
              }

              const canvas = await window.html2canvas(node, { scale: 2, useCORS: true, backgroundColor: '#fdfbf7' });
              const safeTitle = certData.title.replace(/[^a-zA-Z0-9ก-๙]/g, '_').substring(0, 30);

              if (format === 'jpg') {
                const imgData = canvas.toDataURL('image/jpeg', 1.0);
                const link = document.createElement('a');
                link.download = `Certificate_${safeTitle}.jpg`;
                link.href = imgData;
                link.click();
              } else if (format === 'pdf') {
                if (!window.jspdf) {
                  await new Promise((resolve) => {
                    const script = document.createElement('script');
                    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                    script.onload = resolve;
                    document.head.appendChild(script);
                  });
                }
                const { jsPDF } = window.jspdf;
                const imgData = canvas.toDataURL('image/jpeg', 1.0);
                const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [canvas.width, canvas.height] });
                pdf.addImage(imgData, 'JPEG', 0, 0, canvas.width, canvas.height);
                pdf.save(`Certificate_${safeTitle}.pdf`);
              }
            } catch (error) {
              setDownloadError(tx("เกิดข้อผิดพลาดในการดาวน์โหลดใบรับรอง", "An error occurred while downloading the certificate"));
            } finally {
              setIsDownloadingJpg(false);
              setIsDownloadingPdf(false);
            }
          };

          const generateMockHistory = () => {
            const startYear = 2023;
            const startMonth = 8; // August
            const endYear = 2026;
            const endMonth = 4; // April
            const data = [];
            const thaiMonths = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];

            let cumulativeAllTime = 0;

            for (let y = startYear; y <= endYear; y++) {
              let cumulativeYTD = 0; // รีเซ็ตชั่วโมงสะสมรายปี
              let mStart = (y === startYear) ? startMonth : 1;
              let mEnd = (y === endYear) ? endMonth : 12;
              
              for (let m = mStart; m <= mEnd; m++) {
                let monthly = 0;
                
                if (y === 2026 && m === 1) monthly = 4;
                else if (y === 2026 && m === 2) monthly = 6;
                else if (y === 2026 && m === 3) monthly = 8;
                else if (y === 2026 && m === 4) monthly = 4;
                else if (y === 2025 && m === 10) monthly = 8;
                else if (y === 2024 && m === 5) monthly = 18;
                else if (y === 2023 && m === 11) monthly = 12;
                else {
                  if (Math.random() > 0.7) {
                    monthly = Math.floor(Math.random() * 4) + 1;
                  }
                }

                cumulativeYTD += monthly;
                cumulativeAllTime += monthly;
                
                data.push({
                  month: thaiMonths[m - 1],
                  year: y,
                  label: `${thaiMonths[m - 1]} ${(y + 543).toString().substring(2)}`,
                  monthly,
                  cumulativeYTD,
                  cumulativeAllTime
                });
              }
            }
            
            for (let m = endMonth + 1; m <= 12; m++) {
               data.push({
                  month: thaiMonths[m - 1],
                  year: endYear,
                  label: `${thaiMonths[m - 1]} ${(endYear + 543).toString().substring(2)}`,
                  monthly: 0,
                  cumulativeYTD: null,
                  cumulativeAllTime: null
               });
            }

            return data;

                    {/* Step 2: ชำนาญการ (ปัจจุบัน) */}
                    <div className="flex flex-col items-center w-1/4">
                      <div className="w-14 h-14 bg-emerald-500 rounded-full flex items-center justify-center text-white shadow-lg shadow-emerald-500/40 relative z-10 transform scale-110">
                        <div className="absolute -inset-2 bg-emerald-500/20 rounded-full animate-ping"></div>
                        <User size={26} strokeWidth={2.5} />
                      </div>
                      <p className="mt-5 text-xs md:text-sm font-black text-emerald-700 dark:text-emerald-300 bg-emerald-50 dark:bg-emerald-900/40 px-3 py-1.5 rounded-full shadow-sm text-center leading-tight whitespace-nowrap">{tx("ชำนาญการ (ปัจจุบัน)", "Professional (Current)")}</p>
                      <p className="text-[9px] md:text-[10px] text-emerald-600 mt-1.5 text-center">{tx("1 ส.ค. 2566 - ปัจจุบัน", "Aug 1, 2023 - Present")}</p>
                      <p className="text-[9px] md:text-[10px] font-bold text-emerald-600 mt-1 bg-emerald-50 dark:bg-emerald-900/30 px-2 py-1 rounded-md text-center whitespace-nowrap">{tx("ระยะเวลา: 2 ปี 8 เดือน 5 วัน", "Duration: 2 Yrs 8 Mos 5 Days")}</p>
                    </div>

                    {/* Step 3: ชำนาญการพิเศษ */}
                    <div className="flex flex-col items-center group w-1/4">
                      <div className="w-14 h-14 bg-white dark:bg-gray-800 border-[3px] border-blue-500 rounded-full flex items-center justify-center text-blue-500 shadow-md group-hover:scale-110 transition-transform relative z-10">
                        <Target size={24} strokeWidth={2.5} />
                      </div>
                      <p className="mt-4 text-xs md:text-sm font-bold text-blue-600 dark:text-blue-400 text-center px-1 leading-tight">{tx("ชำนาญการพิเศษ (เป้าหมาย)", "Senior Professional (Target)")}</p>
                      <p className="text-[9px] md:text-[10px] text-blue-500 text-center mt-0.5">{tx("คาดการณ์: 1 ส.ค. 2570", "Expected: Aug 1, 2027")}</p>
                      <p className="text-[9px] md:text-[10px] font-bold text-blue-500 mt-1 bg-blue-50 dark:bg-blue-900/30 px-2 py-1 rounded-md text-center whitespace-nowrap">{tx("เหลือเวลา: 1 ปี 3 เดือน 26 วัน", "Remaining: 1 Yr 3 Mos 26 Days")}</p>
                    </div>

                    {/* Step 4: เชี่ยวชาญ */}
                    <div className="flex flex-col items-center group w-1/4">
                      <div className="w-14 h-14 bg-gray-50 dark:bg-gray-800 border-[3px] border-gray-200 dark:border-gray-700 rounded-full flex items-center justify-center text-gray-300 dark:text-gray-600 group-hover:scale-110 transition-transform relative z-10">
                        <Award size={24} strokeWidth={2.5} />
                      </div>
                      <p className="mt-4 text-xs md:text-sm font-bold text-gray-400 dark:text-gray-500 text-center">{tx("เชี่ยวชาญ", "Expert")}</p>
                    </div>
                  </div>
                </div>
              </Card>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <Card accent="bg-gradient-to-r from-blue-500 to-indigo-500" delay={200} className="h-full">
                  <h3 className="text-lg font-black text-blue-800 dark:text-blue-300 mb-6 flex items-center gap-3">
                    <span className="inline-flex p-1.5 bg-blue-100 dark:bg-blue-900/50 rounded-lg text-blue-600 dark:text-blue-400 shadow-sm"><Target size={18} strokeWidth={2}/></span>
                    {tx("เกณฑ์พิจารณาเลื่อนระดับ (ชำนาญการพิเศษ)", "Evaluation Criteria (Senior Professional)")}
                  </h3>
                  <div className="bg-gradient-to-br from-blue-50/80 to-white dark:from-blue-900/20 dark:to-gray-800 p-6 rounded-2xl border border-blue-100/50 dark:border-blue-800/30 shadow-sm h-full flex-1">
                    <ul className="space-y-4">
                      {userData.readinessCriteria.map((criterion, idx) => {
                        const isPassed = criterion.includes("ผ่านเกณฑ์");
                        const isProgress = criterion.includes("อยู่ระหว่างดำเนินการ");
                        
                        let iconColor = "text-gray-400";
                        let bgColor = "bg-gray-100 dark:bg-gray-800";
                        if (isPassed) { iconColor = "text-emerald-600"; bgColor = "bg-emerald-100 dark:bg-emerald-900/40"; }
                        if (isProgress) { iconColor = "text-blue-600"; bgColor = "bg-blue-100 dark:bg-blue-900/40"; }

                        return (
                          <li key={idx} className="flex items-start gap-3 text-sm font-medium text-gray-700 dark:text-gray-300 bg-white/60 dark:bg-gray-800/40 p-4 rounded-xl border border-white dark:border-gray-700/50 shadow-sm transition-all hover:shadow-md hover:-translate-y-0.5">
                            <span className={`inline-flex p-1.5 rounded-full ${bgColor} ${iconColor} mt-0.5 flex-shrink-0`}>
                              {isPassed ? <CheckCircle size={14} strokeWidth={2.5}/> : isProgress ? <Clock size={14} strokeWidth={2.5}/> : <CheckCircle size={14}/>}
                            </span>
                            <span className="leading-relaxed">{criterion}</span>
                          </li>
                        )
                      })}
                    </ul>
                  </div>
                </Card>

                <Card accent="bg-gradient-to-r from-blue-500 to-indigo-500" delay={300} className="h-full">
                  <h4 className="text-lg font-black text-blue-900 dark:text-blue-200 mb-6 flex items-center gap-3">
                    <span className="inline-flex p-1.5 bg-blue-100 dark:bg-blue-800/50 rounded-lg text-blue-600"><Award size={18} strokeWidth={2}/></span> 
                    {tx("ทักษะที่ต้องเตรียมพร้อม (ชำนาญการพิเศษ)", "Skills required (Senior Professional)")}
                  </h4>
                  <div className="bg-gradient-to-br from-blue-50/80 to-indigo-50/30 dark:from-blue-900/20 dark:to-indigo-900/10 rounded-2xl p-5 border border-blue-100/50 dark:border-blue-800/30 shadow-inner flex flex-col gap-4 flex-1">
                    <div className="bg-white/80 dark:bg-gray-800/80 backdrop-blur-sm p-5 rounded-2xl shadow-sm border border-white dark:border-gray-700 hover:shadow-md hover:-translate-y-1 transition-all duration-300">
                      <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start mb-3 gap-3">
                        <span className="text-sm font-black text-gray-800 dark:text-gray-100 leading-snug">{tx("การเป็นผู้ทวนสอบก๊าซเรือนกระจก", "GHG Validator/Verifier")}</span>
                        <span className="text-[10px] font-black uppercase tracking-wider bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-400 px-3 py-1.5 rounded-lg whitespace-nowrap">{tx("การพัฒนา: ต้องเพิ่มเติม", "Gap: Needs Dev")}</span>
                      </div>
                      <p className="text-xs font-medium text-gray-600 dark:text-gray-300 bg-gray-50 dark:bg-gray-700/50 p-3 rounded-xl border border-gray-100 dark:border-gray-700 flex items-start gap-2">
                        <LinkIcon size={14} className="text-gray-400 shrink-0 mt-0.5"/>
                        {tx("เชื่อมโยงกับแผนพัฒนา: เตรียมเข้ารับการอบรม ISO 14064-3 ในไตรมาส 3", "Linked to IDP: Prepare for ISO 14064-3 training in Q3")}
                      </p>
                    </div>
                    <div className="bg-white/80 dark:bg-gray-800/80 backdrop-blur-sm p-5 rounded-2xl shadow-sm border border-white dark:border-gray-700 hover:shadow-md hover:-translate-y-1 transition-all duration-300">
                      <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start mb-3 gap-3">
                        <span className="text-sm font-black text-gray-800 dark:text-gray-100 leading-snug">{tx("การพัฒนาระบบ MRV สำหรับลดก๊าซเรือนกระจก", "MRV System Development for GHG Reduction")}</span>
                        <span className="text-[10px] font-black uppercase tracking-wider bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-400 px-3 py-1.5 rounded-lg whitespace-nowrap">{tx("การพัฒนา: กำลังดำเนินการ", "Gap: In Progress")}</span>
                      </div>
                      <p className="text-xs font-medium text-gray-600 dark:text-gray-300 bg-gray-50 dark:bg-gray-700/50 p-3 rounded-xl border border-gray-100 dark:border-gray-700 flex items-start gap-2">
                        <LinkIcon size={14} className="text-gray-400 shrink-0 mt-0.5"/>
                        {tx("เชื่อมโยงกับระบบพี่เลี้ยง: ปรึกษาแนวทางการทำระบบ MRV กับพี่เลี้ยง", "Linked to Mentoring: Consult MRV system guidelines with Mentor")}
                      </p>
                    </div>
                  </div>
                </Card>
              </div>
            </div>
          );

          return (
            <div className={darkMode ? 'dark' : ''}>
              <div className="h-screen w-full bg-gray-50 dark:bg-gray-900 font-sans text-gray-900 dark:text-gray-100 flex overflow-hidden transition-colors duration-500 relative">
                
                {/* Animated Background Blobs */}
                <div className="fixed top-0 left-0 w-[500px] h-[500px] bg-emerald-300/20 dark:bg-emerald-900/20 rounded-full mix-blend-multiply filter blur-[100px] opacity-70 animate-float-slow pointer-events-none z-0"></div>
                <div className="fixed top-0 right-0 w-[500px] h-[500px] bg-blue-300/20 dark:bg-blue-900/20 rounded-full mix-blend-multiply filter blur-[100px] opacity-70 animate-float-medium pointer-events-none z-0"></div>
                <div className="fixed -bottom-32 left-1/4 w-[500px] h-[500px] bg-purple-300/20 dark:bg-purple-900/20 rounded-full mix-blend-multiply filter blur-[100px] opacity-70 animate-float-fast pointer-events-none z-0"></div>

                {/* Mobile Sidebar Overlay */}
                {isMobileMenuOpen && (
                  <div 
                    className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-40 md:hidden transition-opacity"
                    onClick={() => setIsMobileMenuOpen(false)}
                    aria-hidden="true"
                  />
                )}

                {/* Sidebar */}
                <aside className={`fixed inset-y-0 left-0 w-80 bg-white/90 dark:bg-gray-800/90 backdrop-blur-2xl border-r border-gray-200/50 dark:border-gray-700/50 flex flex-col flex-shrink-0 z-50 shadow-2xl transition-transform duration-300 ease-in-out md:relative md:translate-x-0 ${isMobileMenuOpen ? "translate-x-0" : "-translate-x-full"}`}>
                  <div className="p-8 pb-6 border-b border-gray-100/50 dark:border-gray-700/50 relative">
                    <button 
                      className="md:hidden absolute top-6 right-6 text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 rounded-full p-1"
                      onClick={() => setIsMobileMenuOpen(false)}
                      aria-label={tx("ปิดเมนู", "Close Menu")}
                    >
                      <X size={24} strokeWidth={2}/>
                    </button>

                    <div className="flex items-center gap-4">
                      <div className="w-12 h-12 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-500/30 transform rotate-3">
                        <BookOpen className="text-white w-6 h-6 -rotate-3" strokeWidth={2}/> 
                      </div>
                      <div>
                        <h1 className="text-2xl font-black text-gray-800 dark:text-white leading-none tracking-tight">DCCE</h1>
                        <span className="text-[10px] font-bold text-emerald-600 dark:text-emerald-400 uppercase tracking-widest block mt-1 opacity-90">{tx("สมุดพกการเรียนรู้รายบุคคล", "Learning Portfolio")}</span>
                      </div>
                    </div>
                  </div>
                  <nav className="p-4 space-y-1.5 flex-1 overflow-y-auto custom-scrollbar">
                    <SidebarItem id="profile" icon={User} label={tx("ข้อมูลพื้นฐานและประวัติการทำงาน", "Profile & Work History")} activeTab={activeTab} setActiveTab={setActiveTab} setIsMobileMenuOpen={setIsMobileMenuOpen} />
                    <SidebarItem id="dashboard" icon={LayoutDashboard} label={tx("สรุปภาพรวม", "Dashboard Overview")} activeTab={activeTab} setActiveTab={setActiveTab} setIsMobileMenuOpen={setIsMobileMenuOpen} />
                    <SidebarItem id="competency" icon={Target} label={tx("ศักยภาพและแผนพัฒนา", "Assessment & IDP")} activeTab={activeTab} setActiveTab={setActiveTab} setIsMobileMenuOpen={setIsMobileMenuOpen} />
                    <SidebarItem id="learning" icon={BookOpen} label={tx("ประวัติการพัฒนาและระบบพี่เลี้ยง", "Learning & Mentoring")} activeTab={activeTab} setActiveTab={setActiveTab} setIsMobileMenuOpen={setIsMobileMenuOpen} />
                    <SidebarItem id="elearning" icon={MonitorPlay} label={tx("e-Learning และการฝึกอบรม", "e-Learning & Training")} activeTab={activeTab} setActiveTab={setActiveTab} setIsMobileMenuOpen={setIsMobileMenuOpen} />
                    <SidebarItem id="career" icon={TrendingUp} label={tx("เส้นทางความก้าวหน้า", "Career Path")} activeTab={activeTab} setActiveTab={setActiveTab} setIsMobileMenuOpen={setIsMobileMenuOpen} />
                  </nav>
                  <div className="p-5 m-4 bg-gradient-to-r from-gray-50 to-white dark:from-gray-800 dark:to-gray-800/80 border border-gray-100 dark:border-gray-700 rounded-2xl shadow-sm">
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 rounded-full bg-emerald-100 dark:bg-emerald-900/50 flex items-center justify-center text-emerald-700 dark:text-emerald-400 font-black text-sm border-2 border-white dark:border-gray-700 shadow-sm relative">
                        ส.ช.
                        <div className="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 bg-emerald-500 border-2 border-white dark:border-gray-800 rounded-full"></div>
                      </div>
                      <div className="text-xs overflow-hidden">
                        <p className="font-black text-gray-800 dark:text-gray-100 truncate" title={tx("สมชาย รักษ์โลก", "Somchai Raklok")}>{tx("สมชาย รักษ์โลก", "Somchai Raklok")}</p>
                        <p className="text-emerald-600 dark:text-emerald-400 font-bold truncate mt-0.5">{tx("ชำนาญการ", "Professional")}</p>
                      </div>
                    </div>
                  </div>
                </aside>

                {/* Main Content */}
                <main className="flex-1 overflow-y-auto h-full relative scroll-smooth z-10 custom-scrollbar">
                  <div className="max-w-7xl mx-auto p-4 md:p-8 md:pt-6">
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8 bg-white/70 dark:bg-gray-800/70 backdrop-blur-xl p-4 md:px-6 md:py-4 rounded-2xl border border-white/60 dark:border-gray-700/60 shadow-[0_4px_20px_rgba(0,0,0,0.03)] sticky top-4 z-30 transition-all">
                      <h2 className="text-2xl font-black text-gray-800 dark:text-gray-100 flex items-center gap-3 tracking-tight w-full md:w-auto">
                        <div className="flex items-center justify-between w-full md:w-auto">
                          <div className="flex items-center gap-3">
                            {activeTab === 'dashboard' && <><span className="inline-flex p-2 bg-emerald-100 dark:bg-emerald-900/40 rounded-xl"><LayoutDashboard className="text-emerald-600 dark:text-emerald-400" size={20} strokeWidth={2}/></span> {tx('สรุปภาพรวมศักยภาพ', 'Dashboard Overview')}</>}
                            {activeTab === 'profile' && <><span className="inline-flex p-2 bg-emerald-100 dark:bg-emerald-900/40 rounded-xl"><User className="text-emerald-600 dark:text-emerald-400" size={20} strokeWidth={2}/></span> {tx('ข้อมูลพื้นฐานของฉัน', 'My Profile')}</>}
                            {activeTab === 'competency' && <><span className="inline-flex p-2 bg-emerald-100 dark:bg-emerald-900/40 rounded-xl"><Target className="text-emerald-600 dark:text-emerald-400" size={20} strokeWidth={2}/></span> {tx('ศักยภาพและแผนพัฒนา', 'Competency Assessment & IDP')}</>}
                            {activeTab === 'learning' && <><span className="inline-flex p-2 bg-emerald-100 dark:bg-emerald-900/40 rounded-xl"><BookOpen className="text-emerald-600 dark:text-emerald-400" size={20} strokeWidth={2}/></span> {tx('ประวัติการพัฒนาและระบบพี่เลี้ยง', 'Learning History & Mentoring')}</>}
                            {activeTab === 'elearning' && <><span className="inline-flex p-2 bg-emerald-100 dark:bg-emerald-900/40 rounded-xl"><MonitorPlay className="text-emerald-600 dark:text-emerald-400" size={20} strokeWidth={2}/></span> {tx('e-Learning และการฝึกอบรม', 'e-Learning & Training Resources')}</>}
                            {activeTab === 'career' && <><span className="inline-flex p-2 bg-emerald-100 dark:bg-emerald-900/40 rounded-xl"><TrendingUp className="text-emerald-600 dark:text-emerald-400" size={20} strokeWidth={2}/></span> {tx('ความก้าวหน้าในเส้นทางอาชีพ', 'Career Path Development')}</>}
                          </div>
                          
                          {/* Hamburger menu for mobile */}
                          <button 
                            onClick={() => setIsMobileMenuOpen(true)}
                            className="md:hidden bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 p-2.5 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 flex-shrink-0 focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                            aria-label={tx("เปิดเมนู", "Open Menu")}
                          >
                            <Menu size={20} strokeWidth={2}/>
                          </button>
                        </div>
                      </h2>
                      
                      <div className="flex flex-wrap items-center gap-3 w-full md:w-auto justify-start md:justify-end">
                        {/* Zoom Controls */}
                        <div className="flex items-center bg-white dark:bg-gray-700 rounded-xl shadow-sm border border-gray-100 dark:border-gray-600 overflow-hidden h-10">
                          <button 
                            onClick={() => setZoomLevel(prev => Math.max(0.5, prev - 0.1))}
                            className="p-2.5 text-gray-500 hover:text-emerald-600 dark:text-gray-400 dark:hover:text-emerald-400 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors focus:outline-none"
                            title={tx("ย่อหน้าจอ", "Zoom Out")}
                          >
                            <ZoomOut size={16} strokeWidth={2.5}/>
                          </button>
                          <button 
                            onClick={() => setZoomLevel(1)}
                            className="text-xs font-bold text-gray-700 dark:text-gray-200 min-w-[4ch] text-center hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors focus:outline-none"
                            title={tx("รีเซ็ตขนาด", "Reset Zoom")}
                          >
                            {Math.round(zoomLevel * 100)}%
                          </button>
                          <button 
                            onClick={() => setZoomLevel(prev => Math.min(1.5, prev + 0.1))}
                            className="p-2.5 text-gray-500 hover:text-emerald-600 dark:text-gray-400 dark:hover:text-emerald-400 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors focus:outline-none"
                            title={tx("ขยายหน้าจอ", "Zoom In")}
                          >
                            <ZoomIn size={16} strokeWidth={2.5}/>
                          </button>
                        </div>

                        <button 
                          onClick={() => setDarkMode(!darkMode)}
                          className="flex flex-1 md:flex-none items-center justify-center w-10 h-10 md:w-auto md:px-4 md:py-2.5 gap-2 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-xl text-sm font-bold transition-all shadow-sm border border-gray-100 dark:border-gray-600 hover:shadow-md focus:outline-none focus:ring-2 focus:ring-gray-400"
                          aria-label={tx("สลับโหมดมืด/สว่าง", "Toggle Dark/Light Mode")}
                        >
                          {darkMode ? <Sun size={18} strokeWidth={2} className="text-amber-500" /> : <Moon size={18} strokeWidth={2} className="text-indigo-500" />}
                          <span className="hidden md:inline">{darkMode ? tx('โหมดสว่าง', 'Light Mode') : tx('โหมดมืด', 'Dark Mode')}</span>
                        </button>

                        <button 
                          onClick={() => setLang(lang === 'th' ? 'en' : 'th')}
                          className="flex flex-1 md:flex-none items-center justify-center w-10 h-10 md:w-auto md:px-4 md:py-2.5 gap-2 bg-emerald-50 dark:bg-emerald-900/40 hover:bg-emerald-100 dark:hover:bg-emerald-800/60 text-emerald-700 dark:text-emerald-300 rounded-xl text-sm font-bold transition-all border border-emerald-100 dark:border-emerald-800/50 shadow-sm hover:shadow-md focus:outline-none focus:ring-2 focus:ring-emerald-500"
                          aria-label={tx("เปลี่ยนภาษา", "Change Language")}
                        >
                          <Globe size={18} strokeWidth={2}/>
                          <span>{lang === 'th' ? 'EN' : 'TH'}</span>
                        </button>
                      </div>
                    </header>

                    <div className="pb-20 transition-all duration-300 origin-top" style={{ zoom: zoomLevel }}>
                      {isLoading ? (
                        <TabSkeleton />
                      ) : (
                        <>
                          {activeTab === 'dashboard' && renderDashboard()}
                          {activeTab === 'profile' && renderProfile()}
                          {activeTab === 'competency' && renderCompetency()}
                          {activeTab === 'learning' && renderLearning()}
                          {activeTab === 'elearning' && renderElearning()}
                          {activeTab === 'career' && renderCareerPath()}
                        </>
                      )}
                    </div>
                  </div>
                </main>
                
                {/* Floating Action Button for Feedback */}
                <button
                  onClick={() => setIsFeedbackOpen(true)}
                  className="fixed bottom-6 right-6 md:bottom-8 md:right-8 w-14 h-14 bg-gradient-to-r from-emerald-500 to-teal-500 text-white rounded-full shadow-lg hover:shadow-xl hover:-translate-y-1 hover:scale-105 transition-all duration-300 flex items-center justify-center z-40 focus:outline-none focus:ring-4 focus:ring-emerald-500/30 group"
                  aria-label={tx("ข้อเสนอแนะและแจ้งปัญหา", "Feedback & Report Issue")}
                  title={tx("ข้อเสนอแนะ / แจ้งปัญหา", "Feedback")}
                >
                  <MessageSquare className="group-hover:animate-pulse" size={24} strokeWidth={2} />
                  
                  {/* Tooltip Notification Dot */}
                  <span className="absolute top-0 right-0 w-3.5 h-3.5 bg-red-500 border-2 border-white dark:border-gray-900 rounded-full animate-pulse"></span>
                </button>

                {renderCertModal()}
                {renderMentorModal()}
                {renderFeedbackModal()}
              </div>
              <style dangerouslySetInnerHTML={{__html: `
                .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
                .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
                .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.3); border-radius: 20px; }
                .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(75, 85, 99, 0.4); }
                .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(107, 114, 128, 0.5); }
              `}} />
            </div>
          );
        };

        // Internal icon component
